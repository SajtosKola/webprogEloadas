<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Pizzakemence</title>
    <link rel="icon" type="image/png" href="pizza.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .kemence-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            background-color: #5d4037; /* Sötétbarna "kemence" háttér */
            border-radius: 10px;
            min-height: 200px;
        }
        .pizza-kartya {
            background-color: lightgoldenrodyellow;
            border: 3px solid #ff9800;
            border-radius: 50%; /* Kerek, mint egy pizza */
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: background-color 0.5s;
        }
        .pizza-kartya.sül {
            background-color: #ffcc80; /* Sülés közbeni szín */
            border-color: #e65100;
        }
        .pizza-kartya.kész {
            background-image: url('pizza.png');
            background-size: cover; /* Kitölti a teljes kört */
            background-position: center; /* Középre igazítja a képet */
            background-color: #fff; /* Fehér legyen a kép mögött */
            border-color: #d84315; /* Sötétebb keret */
            font-weight: bold;
            /* Hogy a szöveg továbbra is olvasható maradjon a kép felett */
            color: lawngreen;
            text-shadow: 2px 2px 4px black;
        }
        .vezerlo {
            background: #eee;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        button.sut-gomb {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button.sut-gomb:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<header>
    <h1>Web programozás-1 Előadás Házi feladat</h1>
</header>

<nav>
    <a href="index.html">Főoldal</a>
    <a href="javascript.html">JavaScript CRUD</a>
    <a href="react.html">React CRUD</a>
    <a href="spa.html">SPA Menü</a>
    <a href="fetchapi.html">Fetch API</a>
    <a href="axios.html">Axios Menü</a>
    <a href="oojs.html">OOJS Menü</a>
</nav>

<main>
    <h2 style="text-align: center;">OOJS Pizza Kemence Szimulátor</h2>

    <div class="vezerlo">
        <h3>Gyúrjunk egy új pizzát!</h3>
        <input type="text" id="ujPizzaNev" placeholder="Pl. Sonkás kukoricás" style="padding: 8px; width: 200px;">
        <button onclick="pizzaKeszites()" style="padding: 8px 15px; cursor: pointer;">Pizza bedobása a kemencébe</button>
    </div>

    <div id="kemence" class="kemence-container">
    </div>
</main>

<script>
    // 1. Ősosztály (Alapvető ételekhez)
    class Etel {
        constructor(nev, id) {
            this.nev = nev;
            this.id = id; // Egyedi azonosító a HTML elem megtalálásához
            this.allapot = "Nyers";
        }

        // Egy egyszerű ős-metódus
        allapotJelentese() {
            console.log(`Rendszer üzenet: A(z) ${this.nev} bekerült a rendszerbe.`);
        }
    }

    // 2. Gyermek osztály (A Pizza örökli az Etel tulajdonságait a kötelező 'extends' kulcsszóval)
    class Pizza extends Etel {
        constructor(nev, id) {
            // 3. A 'super' kulcsszóval meghívjuk az ősosztály (Etel) konstruktorát
            super(nev, id);
            this.feltetek = "Sajt és paradicsomszósz"; // Saját tulajdonság
        }

        // Metódus: A HTML elem (DOM Node) létrehozása
        render() {
            // Itt hozzuk létre az elemet JS-ből
            const kartya = document.createElement('div');
            kartya.id = this.id;
            kartya.className = 'pizza-kartya';


            kartya.innerHTML = `
            <strong class="pizza-nev-korvonal">${this.nev}</strong>
            <p class="allapot-szoveg">Állapot: <b>${this.allapot}</b></p>
            <button class="sut-gomb">Megsütöm!</button>
        `;

            // Gomb kattintás esemény
            const gomb = kartya.querySelector('.sut-gomb');
            gomb.onclick = () => this.sutesesInditasa(kartya, gomb);

            return kartya;
        }

        // Metódus: Sütési folyamat
        sutesesInditasa(kartya, gomb) {
            const szoveg = kartya.querySelector('.allapot-szoveg b');

            this.allapot = "Sül...";
            kartya.classList.add('sül');
            szoveg.innerText = this.allapot;
            gomb.disabled = true;
            gomb.innerText = "Készül...";

            // Egy kis késleltetés (3 másodperc szimulált sütésidő)
            setTimeout(() => {
                this.allapot = "Kész!";
                kartya.classList.remove('sül');
                kartya.classList.add('kész'); // Itt jön be a pizza.png háttér!
                szoveg.innerText = this.allapot;

                // Sütés után a gomb funkciója átalakul kiszállításra
                gomb.innerText = "Kiszállítás!";
                gomb.disabled = false;
                gomb.onclick = () => this.kiszallitas();
            }, 3000);
        }

// Metódus: Kiszállítás
        kiszallitas() {
            // 4. Létrehozunk egy értesítést (pop-up üzenet)
            const ertesites = document.createElement('div');
            ertesites.style.position = 'fixed';
            ertesites.style.bottom = '20px';
            ertesites.style.right = '20px';
            ertesites.style.backgroundColor = '#ff9800'; // Narancssárga, amíg úton van
            ertesites.style.color = 'white';
            ertesites.style.padding = '15px';
            ertesites.style.borderRadius = '8px';
            ertesites.style.boxShadow = '0 4px 8px rgba(0,0,0,0.3)';
            ertesites.style.zIndex = '1000';
            ertesites.style.transition = 'background-color 0.5s'; // Lágy színátmenet

            // 1. Fázis: A robogó elindul
            ertesites.innerText = `🛵 Robogó úton a(z) ${this.nev} pizzával...`;

            // Hozzáadjuk közvetlenül a Body-hoz
            document.body.appendChild(ertesites);

            // A pizzát eltüntetjük a kemencéből (hiszen már a futárnál van)
            const kartya = document.getElementById(this.id);
            if (kartya) kartya.remove();

            // 2. Fázis: 3 másodperc utazás után megérkezik
            setTimeout(() => {
                ertesites.innerText = `✅ A(z) ${this.nev} sikeresen kiszállítva!`;
                ertesites.style.backgroundColor = '#4CAF50'; // Zöldre vált a sikerélményhez

                // 3. Fázis: Miután a vevő átvette (újabb 3-4 mp), eltüntetjük a felugró ablakot
                setTimeout(() => {
                    document.body.removeChild(ertesites);
                }, 3500);

            }, 3000); // 3 másodperc a robogó útja
        }
    }

    // Globális változók
    let pizzaSorszam = 0;

    // Ezt hívja a "Pizza bedobása a kemencébe" gomb a HTML-ből
    function pizzaKeszites() {
        const nevInput = document.getElementById('ujPizzaNev');
        const nev = nevInput.value;

        if (nev.trim() === "") {
            alert("Kérlek, adj nevet a pizzának!");
            return;
        }

        pizzaSorszam++;
        const egyediId = "pizza_" + pizzaSorszam;

        // Objektum példányosítása az osztályból
        const ujPizza = new Pizza(nev, egyediId);
        ujPizza.allapotJelentese(); // Meghívjuk az ősosztály metódusát a konzolban

        // Hozzáadjuk a kemencéhez
        const kemence = document.getElementById('kemence');
        kemence.appendChild(ujPizza.render());

        nevInput.value = "";
    }

    // Egy teszt pizza bedobása indításkor, hogy ne legyen üres az oldal
    document.getElementById('ujPizzaNev').value = "Margarita";
    pizzaKeszites();
</script>
</body>
</html>
